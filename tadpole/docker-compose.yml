services:
  mqtt:
    image: eclipse-mosquitto:2
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-W", "1", "-C", "1"]
      interval: 2s
      timeout: 3s
      retries: 5

  brain:
    build:
      context: ..
      dockerfile: brain/Dockerfile
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - .:/brain/.claude
      - circ:/shared/circ
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      BODY_PART: brain
      DEFAULT_ORGAN: pfc
      MEMORY_DB: /brain/organs/hippocampus/memory.db
      CIRC_DIR: /shared/circ
      CIRC_LOCAL_ONLY: "1"
      SPARK_INTERVAL: "${SPARK_INTERVAL:-30}"
      GANGLION_LISTEN_DURATION: "15"
      PFC_CADENCE: "${PFC_CADENCE:-1}"

  comms:
    build:
      context: ..
      dockerfile: tadpole/Dockerfile
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - circ:/shared/circ
      - ${GMAIL_MOCK_DIR:-./.mock_gmail}:/mock_gmail
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      BODY_PART: comms-body
      COMMS_AUTO_CHECK: "1"
      CIRC_DIR: /shared/circ
      CIRC_LOCAL_ONLY: "1"
      SPARK_INTERVAL: "${SPARK_INTERVAL:-30}"
      GANGLION_LISTEN_DURATION: "15"
      GMAIL_MOCK_DIR: /mock_gmail
    entrypoint:
      - bash
      - -c
      - |
        cat > /tmp/comms.conf <<CONF
        ORGANS=/opt/bin/ganglion:/opt/bin/comms
        BODY_PART=comms-body
        DEFAULT_ORGAN=comms
        MQTT_HOST=mqtt
        MQTT_PORT=1883
        CONF
        echo "CADENCE=1" > /opt/bin/comms/organ.conf
        chmod 1777 /shared/circ 2>/dev/null || true
        exec bash /opt/bin/life/spark-loop.sh /tmp/comms.conf

volumes:
  circ:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "uid=0,gid=0,mode=1777"
