name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pii-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for PII in diff
        env:
          PII_PATTERNS: ${{ secrets.PII_PATTERNS }}
        run: python .github/pii_check.py

  a8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install a8s test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto
          pip install pytest -r apps/a8s/tests/requirements.txt
      - run: python -m pytest tests/test_pii.py apps/a8s/tests/ -x -q

  k7e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest apps/k7e/tests/ -x -q -m "not llm"

  l9m-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest apps/l9m/tests/ apps/q3w/tests/ -x -q

  l9m:
    runs-on: ubuntu-latest
    needs: [l9m-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start ollama and pull model
        run: |
          ollama serve &
          sleep 3
          ollama pull qwen3:0.6b
      - name: Test l9m model resolution
        run: |
          export PATH="$PWD:$PATH"
          resolved=$(l9m --model)
          echo "resolved model: $resolved"
          test "$resolved" = "qwen3:0.6b"
      - name: Test l9m generation
        run: |
          export PATH="$PWD:$PATH"
          output=$(l9m -s -p "Reply with exactly: hello")
          echo "output: $output"
          test -n "$output"
      - name: Test q3w dry-run
        run: |
          export PATH="$PWD:$PATH"
          cmd=$(q3w -n list files in current directory)
          echo "generated: $cmd"
          test -n "$cmd"

  k7e-llm:
    runs-on: ubuntu-latest
    needs: [l9m]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start ollama and pull model
        run: |
          ollama serve &
          sleep 3
          ollama pull qwen3:0.6b
      - run: pip install pytest
      - run: |
          export PATH="$PWD:$PATH"
          python -m pytest apps/k7e/tests/ -x -q -m "llm"
