name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      l9m: ${{ steps.filter.outputs.l9m }}
      llm: ${{ steps.filter.outputs.llm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            l9m:
              - 'apps/l9m/**'
              - 'l9m'
              - 'docs/l9m.md'
              - 'apps/q3w/**'
            llm:
              - 'apps/l9m/**'
              - 'l9m'
              - 'docs/l9m.md'
              - 'apps/q3w/**'
              - 'apps/k7e/**'
              - '.github/workflows/test.yml'

  pii-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for PII in diff
        env:
          PII_PATTERNS: ${{ secrets.PII_PATTERNS }}
        run: python .github/pii_check.py

  a8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install a8s test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto
          pip install pytest -r apps/a8s/tests/requirements.txt
      - run: python -m pytest tests/test_pii.py apps/a8s/tests/ -x -q

  k7e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest apps/k7e/tests/ -x -q -m "not llm"

  l9m:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.l9m == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest apps/l9m/tests/ apps/q3w/tests/ -x -q

  llm:
    runs-on: ubuntu-latest
    needs: [changes, l9m]
    if: |
      always() &&
      needs.changes.outputs.llm == 'true' &&
      (needs.l9m.result == 'success' || needs.l9m.result == 'skipped')
    env:
      L9M_MODEL: qwen3:0.6b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Start timer
        run: echo "JOB_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
      - name: Install ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start ollama and pull model
        run: |
          ollama serve &
          sleep 3
          ollama pull qwen3:0.6b
      - name: l9m model resolution
        run: |
          export PATH="$PWD:$PATH"
          resolved=$(l9m --model </dev/null)
          echo "resolved model: $resolved"
          test "$resolved" = "qwen3:0.6b"
      - name: l9m L9M_NUM_CTX
        run: |
          export PATH="$PWD:$PATH"
          size=$(L9M_NUM_CTX=8192 l9m --context-size </dev/null)
          echo "context-size: $size"
          test "$size" = "6144"
      - name: l9m generation
        run: |
          export PATH="$PWD:$PATH"
          output=$(l9m -s -p "Reply with exactly: hello" </dev/null)
          echo "output: $output"
          test -n "$output"
      - name: l9m generation with L9M_NUM_CTX
        run: |
          export PATH="$PWD:$PATH"
          output=$(L9M_NUM_CTX=4096 l9m -s -p "Reply with exactly: hi" </dev/null)
          echo "output: $output"
          test -n "$output"
      - name: q3w dry-run
        run: |
          export PATH="$PWD:$PATH"
          cmd=$(q3w -n list files in current directory </dev/null)
          echo "generated: $cmd"
          test -n "$cmd"
      - name: k7e llm tests
        run: |
          export PATH="$PWD:$PATH"
          pip install pytest
          python -m pytest apps/k7e/tests/ -x -q -m "llm"
      - name: Report timing
        if: always()
        run: |
          end=$(date +%s)
          elapsed=$((end - JOB_START_EPOCH))
          {
            echo "### LLM integration timing"
            echo "- Model: \`qwen3:0.6b\` (via \`L9M_MODEL\`)"
            echo "- Covers: l9m integration, q3w dry-run, k7e \`@llm\` tests"
            echo "- Wall time: **${elapsed}s**"
          } >> "$GITHUB_STEP_SUMMARY"
